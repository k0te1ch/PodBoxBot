apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    basicAuth: false
    isDefault: true
    editable: true
    jsonData:
      tlsSkipVerify: true
      httpMethod: POST
      timeInterval: 1s
      maxLines: 10000
      minInterval: 1s
    readOnly: false
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    basicAuth: false
    editable: true
    jsonData:
      tlsSkipVerify: true
      maxLines: 10000
      minInterval: 1s
