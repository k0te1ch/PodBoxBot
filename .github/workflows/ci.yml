name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: python -m pip install --upgrade pip ruff
      - name: Ruff lint
        run: ruff check "$GITHUB_WORKSPACE/app" "$GITHUB_WORKSPACE/tests"
      - name: Ruff format check
        run: ruff format --check "$GITHUB_WORKSPACE/app" "$GITHUB_WORKSPACE/tests"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry
      - name: Install bot dependencies (system env, mirrors Dockerfile)
        working-directory: app/bot
        run: |
          poetry config virtualenvs.create false
          poetry install --with testing,dev --no-root
      - name: Run tests
        run: pytest -c app/bot/pyproject.toml
