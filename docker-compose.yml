version: '3.8'

services:
  api:
    image: aiogram/telegram-bot-api:latest
    restart: always
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_SERVER_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_SERVER_API_HASH}
      TELEGRAM_LOCAL: ${LOCAL}
    ports:
      - 8081:8081
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    networks:
      - aiogramnetwork
  
  aiogram-bot:
    image: bot
    stop_signal: SIGINT
    restart: always
    build: .
    depends_on:
      - api
      - redis
    links:
      - api
    networks:
      - aiogramnetwork
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
      - .env:/app/.env
    logging:
      driver: "json-file"
      options:
        max-size: "50"
        max-file: "4"

  redis:
    container_name: redis-container
    image: redis:7.2.4-alpine
    restart: always
    stop_signal: SIGINT
    command: "redis-server"
    healthcheck:
        test: [ "CMD", "redis-cli","ping" ]
    ports:
      - 6379:6379
    volumes:
      - redisdata:/data
    networks:
      - aiogramnetwork

networks:
  aiogramnetwork:
    driver: bridge

volumes:
  redisdata:
    driver: local
  telegram-bot-api-data:
    driver: local